services:
  - type: web
    name: 9janetmovies-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: 9janetmovies-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: 9janetmovies-frontend
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://9janetmovies-api.onrender.com

databases:
  - name: 9janetmovies-db
    plan: free